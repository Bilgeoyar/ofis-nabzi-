<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofis Nabzı 💬</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    width: 100%;
    max-width: 600px;
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; }
  header p { font-size: 0.8rem; color: #888; margin-top: 2px; }

  .kalan-badge {
    background: #6c63ff;
    color: white;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .kalan-badge.bitti { background: #ccc; }

  .yaz-kutusu {
    width: 100%;
    max-width: 600px;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .yaz-kutusu textarea {
    width: 100%;
    border: 2px solid #e8e8e8;
    border-radius: 12px;
    padding: 12px;
    font-size: 0.95rem;
    resize: none;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
    height: 80px;
  }

  .yaz-kutusu textarea:focus { border-color: #6c63ff; }
  .yaz-kutusu textarea:disabled { background: #f9f9f9; color: #aaa; }

  .yaz-kutusu button {
    margin-top: 10px;
    width: 100%;
    background: #6c63ff;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .yaz-kutusu button:hover { background: #574fd6; }
  .yaz-kutusu button:disabled { background: #ccc; cursor: not-allowed; }

  .bitti-mesaj {
    text-align: center;
    color: #aaa;
    font-size: 0.85rem;
    margin-top: 8px;
  }

  .mesajlar {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .mesaj-kart {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    animation: giris 0.3s ease;
  }

  @keyframes giris {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .mesaj-ust {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .mesaj-metin {
    font-size: 0.95rem;
    color: #1a1a2e;
    line-height: 1.5;
    flex: 1;
  }

  .mesaj-zaman {
    font-size: 0.75rem;
    color: #bbb;
    margin-left: 12px;
    white-space: nowrap;
  }

  .emoji-butonlar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .emoji-btn {
    background: #f5f5f5;
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .emoji-btn:hover { background: #ede9ff; border-color: #6c63ff; }

  .emoji-btn.secildi {
    background: #ede9ff;
    border-color: #6c63ff;
  }

  .emoji-btn .sayi {
    font-size: 0.78rem;
    color: #666;
    font-weight: 600;
  }

  .bos-mesaj {
    text-align: center;
    color: #bbb;
    padding: 40px 0;
    font-size: 0.95rem;
  }

  .bos-mesaj span { font-size: 2rem; display: block; margin-bottom: 8px; }

  .kendi-mesaj .mesaj-metin::before {
    content: "Sen • ";
    color: #6c63ff;
    font-size: 0.78rem;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>💬 Ofis Nabzı</h1>
    <p>Anonim • Günde 3 mesaj • Sadece emoji tepki</p>
  </div>
  <div class="kalan-badge" id="kalanBadge">3 hak</div>
</header>

<div class="yaz-kutusu">
  <textarea id="mesajInput" placeholder="Aklından ne geçiyor? Anonim olarak yaz..." maxlength="200"></textarea>
  <button id="gonderBtn" onclick="mesajGonder()">Gönder →</button>
  <div class="bitti-mesaj" id="bittiMesaj" style="display:none">
    Bugünlük hakkın bitti! Yarın tekrar yazabilirsin 🌙
  </div>
</div>

<div class="mesajlar" id="mesajlar">
  <div class="bos-mesaj">
    <span>💭</span>
    Henüz mesaj yok. İlk sen yaz!
  </div>
</div>

<script>
  const EMOJILER = ["😂","👍","❤️","🔥","😮","😤","🙏","💯","😴","🤔"];
  
  // Basit ID üret (her oturum için)
  const KULLANICI_ID = "k_" + Math.random().toString(36).substr(2, 9);
  
  let mesajlar = [];
  let bugunKalan = 3;
  let bugunTarih = bugunTarihi();
  let tepkilerim = {}; // mesajId -> emoji

  function bugunTarihi() {
    return new Date().toDateString();
  }

  function yerelYukle() {
    const kayit = localStorage.getItem("ofis_nabzi");
    if (kayit) {
      const veri = JSON.parse(kayit);
      mesajlar = veri.mesajlar || [];
      tepkilerim = veri.tepkilerim || {};
      
      // Gün değiştiyse hakkı sıfırla
      if (veri.tarih === bugunTarihi()) {
        bugunKalan = veri.bugunKalan ?? 3;
      } else {
        bugunKalan = 3;
      }
    }
  }

  function yerelKaydet() {
    localStorage.setItem("ofis_nabzi", JSON.stringify({
      mesajlar,
      tepkilerim,
      bugunKalan,
      tarih: bugunTarihi()
    }));
  }

  function mesajGonder() {
    const input = document.getElementById("mesajInput");
    const metin = input.value.trim();
    
    if (!metin || bugunKalan <= 0) return;

    const yeniMesaj = {
      id: "m_" + Date.now(),
      metin,
      zaman: simdi(),
      sahip: KULLANICI_ID,
      tepkiler: {}
    };

    EMOJILER.forEach(e => yeniMesaj.tepkiler[e] = 0);

    mesajlar.unshift(yeniMesaj);
    bugunKalan--;
    input.value = "";

    yerelKaydet();
    render();
  }

  function tepkiVer(mesajId, emoji) {
    const mesaj = mesajlar.find(m => m.id === mesajId);
    if (!mesaj) return;

    // Kendi mesajına tepki veremesin
    if (mesaj.sahip === KULLANICI_ID) return;

    const onceki = tepkilerim[mesajId];

    // Aynı emojiye tekrar basarsa geri al
    if (onceki === emoji) {
      mesaj.tepkiler[emoji] = Math.max(0, (mesaj.tepkiler[emoji] || 0) - 1);
      delete tepkilerim[mesajId];
    } else {
      // Önceki tepkiyi geri al
      if (onceki) {
        mesaj.tepkiler[onceki] = Math.max(0, (mesaj.tepkiler[onceki] || 0) - 1);
      }
      mesaj.tepkiler[emoji] = (mesaj.tepkiler[emoji] || 0) + 1;
      tepkilerim[mesajId] = emoji;
    }

    yerelKaydet();
    render();
  }

  function simdi() {
    const now = new Date();
    return now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
  }

  function render() {
    // Badge
    const badge = document.getElementById("kalanBadge");
    badge.textContent = bugunKalan + " hak";
    badge.className = "kalan-badge" + (bugunKalan === 0 ? " bitti" : "");

    // Input alanı
    const input = document.getElementById("mesajInput");
    const btn = document.getElementById("gonderBtn");
    const bittiMesaj = document.getElementById("bittiMesaj");

    if (bugunKalan <= 0) {
      input.disabled = true;
      btn.style.display = "none";
      bittiMesaj.style.display = "block";
    } else {
      input.disabled = false;
      btn.style.display = "block";
      bittiMesaj.style.display = "none";
    }

    // Mesajlar
    const konteyner = document.getElementById("mesajlar");

    if (mesajlar.length === 0) {
      konteyner.innerHTML = `<div class="bos-mesaj"><span>💭</span>Henüz mesaj yok. İlk sen yaz!</div>`;
      return;
    }

    konteyner.innerHTML = mesajlar.map(mesaj => {
      const benimMi = mesaj.sahip === KULLANICI_ID;
      const seciliEmoji = tepkilerim[mesaj.id];

      const emojiBtnler = EMOJILER.map(e => {
        const sayi = mesaj.tepkiler[e] || 0;
        const secildi = seciliEmoji === e ? "secildi" : "";
        const disabled = benimMi ? "style='opacity:0.3;cursor:not-allowed'" : "";
        return `<button class="emoji-btn ${secildi}" onclick="${benimMi ? '' : `tepkiVer('${mesaj.id}','${e}')`}" ${disabled}>
          ${e} <span class="sayi">${sayi > 0 ? sayi : ""}</span>
        </button>`;
      }).join("");

      return `
        <div class="mesaj-kart ${benimMi ? 'kendi-mesaj' : ''}">
          <div class="mesaj-ust">
            <div class="mesaj-metin">${escHtml(mesaj.metin)}</div>
            <div class="mesaj-zaman">${mesaj.zaman}</div>
          </div>
          <div class="emoji-butonlar">${emojiBtnler}</div>
        </div>
      `;
    }).join("");
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // Başlat
  yerelYukle();
  render();
</script>
</body>
</html>
